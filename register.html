<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        Register | Smart Farming

    </title>

    <!-- Bootstrap CSS -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <!-- Custom CSS -->

    <link
        rel="stylesheet"
        href="css/style.css"
    >

</head>

<body class="register-body">

    <!-- =========================
         NAVBAR
    ========================= -->

    <nav
        class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm"
    >

        <div class="container">

            <!-- Logo -->

            <a
                class="navbar-brand fw-bold"
                href="index.html"
            >

                <i class="fa-solid fa-leaf"></i>

                Smart Farming

            </a>

            <!-- Mobile Toggle -->

            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
            >

                <span class="navbar-toggler-icon"></span>

            </button>

            <!-- Navbar Links -->

            <div
                class="collapse navbar-collapse"
                id="navbarNav"
            >

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">

                        <a
                            class="nav-link"
                            href="index.html"
                        >

                            Home

                        </a>

                    </li>

                    <li class="nav-item">

                        <a
                            class="nav-link"
                            href="login.html"
                        >

                            Login

                        </a>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- =========================
         REGISTER SECTION
    ========================= -->

    <section class="register-section">

        <div class="container">

            <div
                class="row justify-content-center align-items-center min-vh-100"
            >

                <div class="col-lg-6">

                    <div
                        class="card register-card shadow-lg border-0"
                    >

                        <div class="card-body p-5">

                            <!-- Heading -->

                            <div class="text-center mb-4">

                                <i
                                    class="fa-solid fa-user-plus register-icon"
                                ></i>

                                <h2
                                    class="fw-bold mt-3"
                                >

                                    Create Account

                                </h2>

                                <p class="text-muted">

                                    Register for Smart Farming Management

                                </p>

                            </div>

                            <!-- =========================
                                 REGISTER FORM
                            ========================= -->

                            <form
                                action="backend/register.php"
                                method="POST"
                            >

                                <!-- Full Name -->

                                <div class="mb-3">

                                    <label class="form-label">

                                        Full Name

                                    </label>

                                    <input
                                        type="text"
                                        name="name"
                                        class="form-control"
                                        placeholder="Enter your full name"
                                        required
                                    >

                                </div>

                                <!-- Email -->

                                <div class="mb-3">

                                    <label class="form-label">

                                        Email Address

                                    </label>

                                    <input
                                        type="email"
                                        name="email"
                                        class="form-control"
                                        placeholder="Enter your email"
                                        required
                                    >

                                </div>

                                <!-- Password -->

                                <div class="mb-3">

                                    <label class="form-label">

                                        Password

                                    </label>

                                    <input
                                        type="password"
                                        name="password"
                                        class="form-control"
                                        placeholder="Create password"
                                        required
                                    >

                                </div>

                                <!-- Confirm Password -->

                                <div class="mb-4">

                                    <label class="form-label">

                                        Confirm Password

                                    </label>

                                    <input
                                        type="password"
                                        name="confirm_password"
                                        class="form-control"
                                        placeholder="Confirm password"
                                        required
                                    >

                                </div>

                                <!-- Terms -->

                                <div class="form-check mb-4">

                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                        required
                                    >

                                    <label class="form-check-label">

                                        I agree to the Terms &
                                        Conditions

                                    </label>

                                </div>

                                <!-- Submit Button -->

                                <button
                                    type="submit"
                                    class="btn btn-success w-100"
                                >

                                    Create Account

                                </button>

                            </form>

                            <!-- Login Link -->

                            <div class="text-center mt-4">

                                <p>

                                    Already have an account?

                                    <a
                                        href="login.html"
                                        class="text-success fw-bold text-decoration-none"
                                    >

                                        Login

                                    </a>

                                </p>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Bootstrap JS -->

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>

</body>

</html>
